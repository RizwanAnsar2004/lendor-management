server:
  port: 8088

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/gcp}
    username: ${DB_USER:gcp}
    password: ${DB_PASS:gcp}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

gcp:
  jwt:
    secret: ${JWT_SECRET:change-me-dev-secret-at-least-32-bytes-long!}
    expiry-seconds: ${JWT_EXPIRY_SECONDS:3600}
  otp:
    expiry-seconds: ${OTP_EXPIRY_SECONDS:600}
    max-attempts: ${OTP_MAX_ATTEMPTS:5}
  mail:
    from: ${MAIL_FROM:no-reply@gcp.local}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
