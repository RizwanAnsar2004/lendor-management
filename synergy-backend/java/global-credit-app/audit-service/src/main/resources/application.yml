server:
  port: 8091

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/gcp}
    username: ${DB_USER:gcp}
    password: ${DB_PASS:gcp}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    table: flyway_schema_history_audit
    baseline-on-migrate: true
    baseline-version: 0

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info
