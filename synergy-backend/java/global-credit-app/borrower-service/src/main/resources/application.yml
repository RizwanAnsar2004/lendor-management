server:
  port: 8089

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/gcp}
    username: ${DB_USER:gcp}
    password: ${DB_PASS:gcp}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

gcp:
  storage:
    local-root: ${DOC_STORAGE_ROOT:./data/uploads}
  documents:
    allowed-content-types: application/pdf,image/png,image/jpeg

management:
  endpoints:
    web:
      exposure:
        include: health,info
