server:
  port: 8089

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/gcp}
    username: ${DB_USER:gcp}
    password: ${DB_PASS:gcp}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    table: flyway_schema_history_borrower
    baseline-on-migrate: true
    baseline-version: 0
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

gcp:
  audit:
    base-url: ${AUDIT_SERVICE_URL:http://localhost:8091}
  storage:
    local-root: ${DOC_STORAGE_ROOT:./data/uploads}
  documents:
    allowed-content-types: application/pdf,image/png,image/jpeg

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info
